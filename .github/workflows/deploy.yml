name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed for the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Node 24 ships npm 11. The lock file is generated by npm 11 locally; an
      # older npm (e.g. Node 20's npm 10) mis-validates the @emnapi bundled-dep
      # records and fails `npm ci` with EUSAGE. Node 24 also clears the GitHub
      # Actions Node 20 runtime deprecation.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          # Served from https://<user>.github.io/english-quest/
          PAGES_BASE_PATH: /english-quest
          # Optional: set repo variable NEXT_PUBLIC_GOOGLE_CLIENT_ID to enable
          # "Sign in with Google". Leave unset to ship demo login only.
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
